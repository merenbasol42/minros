; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Ortak ayarlar — tüm env'ler miras alır. Bu, minros reposunun *içindeki*
; geliştirme ortamı: minros'u yayınlanmış sürümden değil, repo kökündeki
; canlı kaynaktan (symlink://..) çeker. Kütüphaneyi düzenle → burada anında
; derlenir → minros reposunda commit et. Ekstra kurulum yok.
[env]
lib_deps = symlink://..

[env:esp32s3box]
platform = espressif32
board = esp32s3box
framework = arduino
build_unflags = -std=gnu++11
build_flags = -std=gnu++17

; ; Native test ortamı — donanım gerekmez, `pio test -e native` ile çalıştır
; [env:native]
; platform = native
; build_flags = -std=c++17
; ; Arduino bağımlı src/main.cpp derlenmesini engelle
; build_src_filter = -<*>
